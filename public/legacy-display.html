<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="format-detection" content="telephone=no" />
    <title>Flight Tracker — Display</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        height: 100%;
        min-height: 100vh;
        min-height: -webkit-fill-available;
        overflow: hidden;
        -webkit-text-size-adjust: 100%;
        background: #000;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }

      #app,
      .flight-wall-mini,
      .flight-wall-mini__screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      /* Home-screen mode on iPad 4 — pin to visual viewport (iOS 10 has no safe-area). */
      html.standalone,
      html.standalone body {
        height: 100%;
        min-height: 100%;
      }

      html.standalone #app,
      html.standalone .flight-wall-mini,
      html.standalone .flight-wall-mini__screen {
        top: 0;
        bottom: 0;
        height: 100%;
      }

      .flight-wall-mini__canvas {
        position: absolute;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
      }

      .flight-wall-mini__overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .flight-wall-mini__scanlines {
        position: absolute;
        inset: 0;
        opacity: 0.03;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 3px,
          rgba(0, 0, 0, 0.35) 3px,
          rgba(0, 0, 0, 0.35) 4px
        );
      }

      .flight-wall-mini__vignette {
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse 98% 94% at 50% 50%,
          transparent 72%,
          rgba(0, 0, 0, 0.12) 100%
        );
      }

      .flight-wall-mini__status {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 4px 8px;
        font-family: 'Helvetica Neue', Arial, sans-serif;
        font-size: 9px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.28);
        text-align: center;
        pointer-events: none;
      }

      .legacy-error {
        display: -webkit-flex;
        display: flex;
        -webkit-align-items: center;
        align-items: center;
        -webkit-justify-content: center;
        justify-content: center;
        height: 100%;
        padding: 24px;
        text-align: center;
        color: #f5e842;
        font-family: 'Helvetica Neue', Arial, sans-serif;
      }

      .legacy-error h2 {
        font-size: 15px;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .legacy-error p {
        font-size: 12px;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.65);
      }

      .legacy-error__host {
        margin-top: 10px;
      }

      .legacy-error code {
        color: #fff;
        font-size: 11px;
      }

      .kiosk-fullscreen-btn {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 200;
        min-height: 44px;
        min-width: 44px;
        padding: 10px 14px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.72);
        color: rgba(255, 255, 255, 0.88);
        font-family: 'Helvetica Neue', Arial, sans-serif;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        -webkit-appearance: none;
        appearance: none;
        cursor: pointer;
      }

      .kiosk-fullscreen-btn:active {
        background: rgba(40, 40, 40, 0.9);
      }

      .kiosk-fullscreen-help {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 300;
        padding: 24px;
        background: rgba(0, 0, 0, 0.88);
        -webkit-box-align: center;
        -webkit-align-items: center;
        align-items: center;
        -webkit-box-pack: center;
        -webkit-justify-content: center;
        justify-content: center;
      }

      .kiosk-fullscreen-help__card {
        max-width: 22rem;
        padding: 1.1rem 1rem 1rem;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 10px;
        background: #111827;
        color: #e5e7eb;
        font-family: 'Helvetica Neue', Arial, sans-serif;
        text-align: center;
      }

      .kiosk-fullscreen-help__card h2 {
        margin: 0 0 0.65rem;
        font-size: 1rem;
        font-weight: 700;
        color: #fff;
      }

      .kiosk-fullscreen-help__card p {
        margin: 0 0 0.75rem;
        font-size: 0.85rem;
        line-height: 1.45;
        color: #cbd5e1;
      }

      .kiosk-fullscreen-help__card ol {
        margin: 0 0 1rem;
        padding-left: 1.2rem;
        text-align: left;
        font-size: 0.82rem;
        line-height: 1.5;
        color: #94a3b8;
      }

      .kiosk-fullscreen-help__dismiss {
        min-height: 44px;
        padding: 0 1rem;
        border: none;
        border-radius: 8px;
        background: #38bdf8;
        color: #020617;
        font-size: 0.85rem;
        font-weight: 600;
        -webkit-appearance: none;
        appearance: none;
      }
    </style>
  </head>
  <body>
    <div id="app" class="flight-wall-mini">
      <div class="flight-wall-mini__screen">
        <div class="legacy-error">
          <div>
            <h2>Starting display</h2>
            <p>Loading FlightWall LED…</p>
          </div>
        </div>
      </div>
    </div>

    <script src="/legacy-display-shared.js?v=mqo6gnn6"></script>
    <script src="/legacy-nosleep.js"></script>
    <script src="/legacy-screen.js"></script>
    <script src="/legacy-kiosk.js"></script>
    <script src="/legacy-led-wall.js?v=mqo6gnn6"></script>
    <script src="/legacy-led-display.js?v=mqo6gnn6"></script>
    <script src="/legacy-display-boot.js?v=mqo6gnn6"></script>
  </body>
</html>
