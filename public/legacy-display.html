<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="format-detection" content="telephone=no" />
    <title>Flight Tracker — Display</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        height: 100%;
        min-height: 100vh;
        min-height: -webkit-fill-available;
        overflow: hidden;
        -webkit-text-size-adjust: 100%;
        background: #000;
        -webkit-user-select: none;
        user-select: none;
        -webkit-touch-callout: none;
      }

      #app,
      .flight-wall-mini,
      .flight-wall-mini__screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }

      /* Home-screen mode on iPad 4 — pin to visual viewport (iOS 10 has no safe-area). */
      html.standalone,
      html.standalone body {
        height: 100%;
        min-height: 100%;
      }

      html.standalone #app,
      html.standalone .flight-wall-mini,
      html.standalone .flight-wall-mini__screen {
        top: 0;
        bottom: 0;
        height: 100%;
      }

      .flight-wall-mini__canvas {
        position: absolute;
        inset: 0;
        display: block;
        width: 100%;
        height: 100%;
        image-rendering: pixelated;
      }

      .flight-wall-mini__overlay {
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .flight-wall-mini__scanlines {
        position: absolute;
        inset: 0;
        opacity: 0.03;
        background: repeating-linear-gradient(
          0deg,
          transparent,
          transparent 3px,
          rgba(0, 0, 0, 0.35) 3px,
          rgba(0, 0, 0, 0.35) 4px
        );
      }

      .flight-wall-mini__vignette {
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse 98% 94% at 50% 50%,
          transparent 72%,
          rgba(0, 0, 0, 0.12) 100%
        );
      }

      .flight-wall-mini__status {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 4px 8px;
        font-family: 'Helvetica Neue', Arial, sans-serif;
        font-size: 9px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.28);
        text-align: center;
        pointer-events: none;
      }

      .legacy-error {
        display: -webkit-flex;
        display: flex;
        -webkit-align-items: center;
        align-items: center;
        -webkit-justify-content: center;
        justify-content: center;
        height: 100%;
        padding: 24px;
        text-align: center;
        color: #f5e842;
        font-family: 'Helvetica Neue', Arial, sans-serif;
      }

      .legacy-error h2 {
        font-size: 15px;
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .legacy-error p {
        font-size: 12px;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.65);
      }

      .legacy-error__host {
        margin-top: 10px;
      }

      .legacy-error code {
        color: #fff;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <div id="app" class="flight-wall-mini">
      <div class="flight-wall-mini__screen">
        <div class="legacy-error">
          <div>
            <h2>Starting display</h2>
            <p>Loading FlightWall LED…</p>
          </div>
        </div>
      </div>
    </div>

    <script src="/legacy-display-shared.js?v=mqoa1r1i"></script>
    <script src="/legacy-nosleep.js"></script>
    <script src="/legacy-screen.js"></script>
    <script src="/legacy-kiosk.js"></script>
    <script src="/legacy-led-wall.js?v=mqoa1r1i"></script>
    <script src="/legacy-led-display.js?v=mqoa1r1i"></script>
    <script src="/legacy-display-boot.js?v=mqoa1r1i"></script>
  </body>
</html>
